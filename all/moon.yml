tasks:
  dbinit:
    script: 'bun run --env-file=../.env db:reset ; bun run --env-file=../.env auth:schema ; bun run --env-file=../.env db:push'
  dbgen:
    script: 'bun run --env-file=../.env auth:schema ; bun run --env-file=../.env db:generate'
  dbup:
    script: 'bun run --env-file=../.env db:migrate'
  dev:
    script: 'bun run --env-file=../.env db:studio'
  install:
    script: 'pnpm install --force'
  update:
    script: 'pnpm up --latest'